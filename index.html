<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五六七 | 个人博客</title>
    <meta
      name="description"
      content="一个关于阅读、技术与思考的个人博客首页。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="五六七首页">
          <img
            class="brand-avatar"
            src="assets/avatar.jpg"
            alt=""
            aria-hidden="true"
          />
          <span class="brand-text">五六七</span>
        </a>
        <nav class="main-nav" aria-label="主导航">
          <a data-nav="home" href="index.html">首页</a>
          <a data-nav="works" href="works.html">作品</a>
          <a data-nav="shelf" href="shelf.html">书架</a>
          <a data-nav="fragments" href="fragments.html">碎片</a>
          <a data-nav="about" href="about.html">关于我</a>
        </nav>
        <div class="header-actions">
          <button class="icon-button" type="button" aria-label="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.75"></circle>
              <path d="M16.2 16.2 20 20"></path>
            </svg>
          </button>
          <button
            class="icon-button theme-toggle"
            type="button"
            aria-label="切换主题"
          >
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4.2"></circle>
              <path d="M12 1.5v3"></path>
              <path d="M12 19.5v3"></path>
              <path d="M4.6 4.6 6.7 6.7"></path>
              <path d="M17.3 17.3 19.4 19.4"></path>
              <path d="M1.5 12h3"></path>
              <path d="M19.5 12h3"></path>
              <path d="M4.6 19.4 6.7 17.3"></path>
              <path d="M17.3 6.7 19.4 4.6"></path>
            </svg>
          </button>
        </div>
      </header>

      <main>
        <section class="hero-section">
          <div class="hero-copy">
            <p class="eyebrow">写在晨光与纸页之间</p>
            <h1>今天在想什么？</h1>
            <p class="hero-text">
              把读书时的感受、写代码时的顿悟、以及生活里那些一闪而过的念头，
              都慢慢收进这一方安静的页面。它不急于给出结论，只认真记录思考的纹理。
            </p>
            <p class="hero-text">
              在这里，技术与文学并排而坐，历史与日常互相照亮。
              愿每一次停留，都像翻开一本恰好合意的书。
            </p>
            <a class="text-link" href="fragments.html">更多碎片</a>
          </div>
          <div class="hero-art">
            <div class="hero-halo"></div>
            <img src="assets/home-hero.jpg" alt="首页主视觉图片" />
          </div>
        </section>

        <section class="content-grid">
          <div class="content-main">
            <section class="section-block">
              <div class="section-heading">
                <span class="heading-mark"></span>
                <h2>最近更新</h2>
              </div>
              <div class="post-grid" data-post-grid></div>
            </section>

            <section class="section-block archive-section">
              <div class="archive-header">
                <p class="archive-kicker">文章归档</p>
                <h2>全部文章</h2>
              </div>

              <div class="archive-layout">
                <aside class="archive-sidebar" aria-label="博客资料">
                  <section class="sidebar-card profile-card">
                    <img
                      class="profile-avatar"
                      src="assets/avatar.jpg"
                      alt="博客头像"
                    />
                    <h3>五六七</h3>
                    <p class="profile-bio">
                      生如远舟，向死而生
                    </p>
                    <div class="profile-stats">
                      <span>18 篇文章</span>
                      <span>12 个标签</span>
                    </div>
                  </section>

                  <section class="sidebar-card taxonomy-card">
                    <h3 class="sidebar-card-title">分类</h3>
                    <div class="taxonomy-list" data-category-list></div>
                  </section>

                  <section class="sidebar-card tags-card">
                    <h3 class="sidebar-card-title">标签</h3>
                    <div class="tag-cloud" data-tag-list></div>
                  </section>
                </aside>

                <div class="archive-list" data-archive-list></div>
              </div>
            </section>
          </div>
        </section>
      </main>

    </div>

    <script src="script.js"></script>
  </body>
</html>
