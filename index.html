<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五六七 | 个人博客</title>
    <meta
      name="description"
      content="一个关于阅读、技术与思考的个人博客首页。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <div data-shared-header></div>

      <main>
        <section class="hero-section">
          <div class="hero-copy">
            <p class="eyebrow">写在晨光与纸页之间</p>
            <h1>今天在想什么？</h1>
            <p class="hero-text">
              把读书时的感受、写代码时的顿悟、以及生活里那些一闪而过的念头，
              都慢慢收进这一方安静的页面。它不急于给出结论，只认真记录思考的纹理。
            </p>
            <p class="hero-text">
              在这里，技术与文学并排而坐，历史与日常互相照亮。
              愿每一次停留，都像翻开一本恰好合意的书。
            </p>
            <a class="text-link" href="fragments.html">更多碎片</a>
          </div>
        </section>

        <section class="content-grid">
          <div class="content-main">
            <section class="section-block">
              <div class="section-heading">
                <span class="heading-mark"></span>
                <h2>最近更新</h2>
              </div>
              <div class="post-grid" data-post-grid></div>
            </section>

            <section class="section-block archive-section">
              <div class="archive-header">
                <p class="archive-kicker">文章归档</p>
                <h2>全部文章</h2>
              </div>

              <div class="archive-layout">
                <aside class="archive-sidebar" aria-label="博客资料">
                  <section class="sidebar-card profile-card">
                    <img
                      class="profile-avatar"
                      src="assets/avatar.jpg"
                      alt="博客头像"
                    />
                    <h3>五六七</h3>
                    <p class="profile-bio">
                      生如远舟，向死而生
                    </p>
                    <div class="profile-stats">
                      <span>18 篇文章</span>
                      <span>12 个标签</span>
                    </div>
                  </section>

                  <section class="sidebar-card taxonomy-card">
                    <h3 class="sidebar-card-title">分类</h3>
                    <div class="taxonomy-list" data-category-list></div>
                  </section>

                  <section class="sidebar-card tags-card">
                    <h3 class="sidebar-card-title">标签</h3>
                    <div class="tag-cloud" data-tag-list></div>
                  </section>
                </aside>

                <div class="archive-list" data-archive-list></div>
              </div>
            </section>
          </div>
        </section>
      </main>

    </div>

    <script src="script.js?v=20260702"></script>
  </body>
</html>
